services:
  - type: web
    name: project-a-web
    runtime: node
    plan: starter
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run db:generate && npm run build
    preDeployCommand: npm run db:deploy
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_APP_NAME
        value: Project-A
      - key: DATABASE_URL
        fromDatabase:
          name: project-a-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false

databases:
  - name: project-a-db
    plan: basic-256mb
    databaseName: project_a
    user: project_a
