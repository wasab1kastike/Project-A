services:
  - type: web
    name: project-a-web
    runtime: node
    plan: starter
    autoDeployTrigger: commit
    buildCommand: node scripts/render-build.mjs web
    preDeployCommand: npm run db:deploy
    startCommand: npm run start
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - .node-version
        - package.json
        - package-lock.json
        - render.yaml
        - scripts/**
        - apps/web/**
    envVars:
      - key: NEXT_PUBLIC_APP_NAME
        value: Project-A
      # Required runtime auth values for the web service.
      # AUTH_URL is optional on Render because the app falls back to RENDER_EXTERNAL_URL.
      - key: DATABASE_URL
        fromDatabase:
          name: project-a-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
      # Used by the seed flow to create the first admin account.
      - key: ADMIN_EMAIL
        sync: false

  - type: cron
    name: project-a-game-tick
    runtime: node
    plan: starter
    autoDeployTrigger: commit
    buildCommand: node scripts/render-build.mjs cron
    startCommand: npm run game:tick
    schedule: "* * * * *"
    buildFilter:
      paths:
        - .node-version
        - package.json
        - package-lock.json
        - render.yaml
        - scripts/**
        - apps/web/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: project-a-db
          property: connectionString

databases:
  - name: project-a-db
    plan: basic-256mb
    databaseName: project_a
    user: project_a
