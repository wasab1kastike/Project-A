services:
  - type: web
    name: project-a-web
    runtime: node
    plan: starter
    autoDeployTrigger: commit
    buildCommand: node scripts/render-build.mjs web
    preDeployCommand: npm run db:deploy
    startCommand: npm run start
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - .node-version
        - package.json
        - package-lock.json
        - render.yaml
        - scripts/**
        - apps/web/**
    envVars:
      # Runtime secrets and connection strings should come from Render env or the
      # managed database binding below. Do not commit real secrets to this file.
      - key: NEXT_PUBLIC_APP_NAME
        value: Project-A
      - key: DATABASE_URL
        fromDatabase:
          name: project-a-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false

  - type: cron
    name: project-a-game-tick
    runtime: node
    plan: starter
    autoDeployTrigger: commit
    buildCommand: node scripts/render-build.mjs cron
    startCommand: npm run game:tick
    schedule: "* * * * *"
    buildFilter:
      paths:
        - .node-version
        - package.json
        - package-lock.json
        - render.yaml
        - scripts/**
        - apps/web/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: project-a-db
          property: connectionString

databases:
  - name: project-a-db
    plan: basic-256mb
    databaseName: project_a
    user: project_a
